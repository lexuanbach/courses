<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Course Homework Submission</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      max-width: 600px;
      margin: auto;
      padding: 40px;
    }

    .card{
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
    }

    button{
      padding: 10px 15px;
    }
  </style>
</head>
<body>

  <h2>Submit Homework</h2>

  <div class="card">
    <label>Name</label>
    <input id="name" type="text"><br><br>

    <label>Student ID</label>
    <input id="sid" type="text"><br><br>

    <label>Upload file</label>
    <input id="file" type="file"><br><br>

    <button onclick="submitHomework()">Submit</button>

    <p id="status"></p>
  </div>

  <script>
    const SUPABASE_URL = "https://rxeelginatrtforhoiqx.supabase.co";
    const SUPABASE_KEY = "sb_publishable_B8cYuAX1TZpma3Ob_Ohsgw_uGjC8i0z";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function submitHomework() {
      const name = document.getElementById("name").value.trim();
      const sid = document.getElementById("sid").value.trim();
      const file = document.getElementById("file").files[0];
      const status = document.getElementById("status");

      if (!name) {
        status.innerText = "Please enter your name.";
        return;
      }

      if (!sid) {
        status.innerText = "Please enter your student ID.";
        return;
      }

      if (!file) {
        status.innerText = "Please upload a file.";
        return;
      }

      const filename = `${sid}_${Date.now()}_${file.name}`;

      status.innerText = "Uploading...";

      const { data, error } = await client
        .storage
        .from("homework")
        .upload(filename, file);

      if (error) {
        console.error(error);
        status.innerText = "Upload failed: " + error.message;
      } else {
        status.innerText = "Submitted successfully!";
        console.log(data);
      }
    }
  </script>

</body>
</html>
